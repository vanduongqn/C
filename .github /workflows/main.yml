name: Update Football

on:
  repository_dispatch:
    types: [trigger-football-crawl]   # Lắng nghe tín hiệu từ Cron-job.org
  workflow_dispatch:                 # Cho phép bạn bấm nút chạy thủ công khi cần

permissions:
  contents: write                     # Cấp quyền ghi vào repo

jobs:
  update-streams:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true   # Giữ thông tin cấu hình để thực hiện git push mượt mà hơn

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp requests

      - name: Run Python script
        run: python craw.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n $(git status --porcelain) ]]; then
            git add tv.m3u full.m3u channels.json
            git commit -m "Auto update streams - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Files updated and pushed successfully!"
          else
            echo "ℹ️ No changes to commit."
          fi
